openapi: 3.0.0
info:
  title: specEx API
  description: Specialization Explorer API
  version: 1.0.0
tags:
  - name: User
    description: endpoints accessible by the general public
  - name: Admin
    description: endpoints accessible by admins
x-amazon-apigateway-request-validators:
  all:
    validateRequestParameters: true
    validateRequestBody: true
  params-only:
    validateRequestParameters: true
    validateRequestBody: false
x-amazon-apigateway-request-validator: params-only
x-amazon-apigateway-gateway-responses:
  UNAUTHORIZED:
    statusCode: "401"
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Headers: "'*'"
      gatewayresponse.header.Access-Control-Allow-Methods: "'*'"
      gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
    responseTemplates:
      application/json: |
        {"message":$context.error.messageString}
x-common-options: &commonOptions
  options:
    summary: CORS support
    description: |
      Enable CORS by returning correct headers
    responses:
      200:
        $ref: "#/components/responses/Success"
    x-amazon-apigateway-integration:
      type: mock
      requestTemplates:
        application/json: |
          {
            "statusCode" : 200
          }
      responses:
        default:
          statusCode: "200"
          responseParameters:
            method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
            method.response.header.Access-Control-Allow-Methods: "'*'"
            method.response.header.Access-Control-Allow-Origin: "'*'"
          responseTemplates:
            application/json: |
              {}

paths:
  /admin/promote_user:
    <<: *commonOptions
    post:
      tags: [Admin]
      summary: Update an existing user's email and role (update-only)
      operationId: admin_update_user
      security:
        - adminAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, email, role]
              properties:
                user_id:
                  type: string
                  description: UUID of the user row to update
                email:
                  type: string
                role:
                  type: string
                  enum: [student, admin]
      responses:
        "200":
          description: Updated user
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "404":
          description: User not found
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations
        passthroughBehavior: "when_no_match"
        httpMethod: POST
        type: aws_proxy

  /admin/users:
    <<: *commonOptions
    get:
      tags:
        - Admin
      summary: Get system users
      operationId: get_admin_users
      security:
        - adminAuthorizer: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of users
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations
        passthroughBehavior: "when_no_match"
        httpMethod: POST
        type: aws_proxy
    post:
      tags:
        - Admin
      summary: Create a new admin user
      operationId: create_admin_user
      security:
        - adminAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - display_name
                - email
              properties:
                display_name:
                  type: string
                  maxLength: 255
                email:
                  type: string
                  format: email
                  maxLength: 255
                institution_id:
                  type: string
                  maxLength: 255
      responses:
        "201":
          description: Admin user created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  display_name:
                    type: string
                  email:
                    type: string
                  role:
                    type: string
                    example: "admin"
        "409":
          description: Email already exists
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations
        passthroughBehavior: "when_no_match"
        httpMethod: POST
        type: aws_proxy
      x-amazon-apigateway-request-validator: all


  /admin/users/{userId}/chat_sessions:
    <<: *commonOptions
    get:
      tags:
        - Admin
      summary: Get chat sessions for a specific user
      operationId: get_admin_user_chat_sessions
      security:
        - adminAuthorizer: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of chat sessions
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations
        passthroughBehavior: "when_no_match"
        httpMethod: POST
        type: aws_proxy

  /admin/chat_sessions/{sessionId}/messages:
    <<: *commonOptions
    get:
      tags:
        - Admin
      summary: Get messages for a specific chat session
      operationId: get_admin_chat_session_messages
      security:
        - adminAuthorizer: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of chat messages
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations
        passthroughBehavior: "when_no_match"
        httpMethod: POST
        type: aws_proxy

  /admin/data_sources/website:
    <<: *commonOptions
    post:
      tags: [Admin]
      summary: Add website data source
      operationId: add_website_data_source
      security:
        - adminAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - created_by
              properties:
                name:
                  type: string
                  example: https://example.com
                include_patterns:
                  type: array
                  items:
                    type: string
                exclude_patterns:
                  type: array
                  items:
                    type: string
                created_by:
                  type: string
                  example: example@email.com
      responses:
        "200":
          description: Website data source request accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  name:
                    type: string
                  include_patterns:
                    type: array
                    items:
                      type: string
                  exclude_patterns:
                    type: array
                    items:
                      type: string
                  created_by:
                    type: string
        "400":
          description: Invalid request
        "404":
          description: Route not found
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaKnowledgeBase.Arn}/invocations
        passthroughBehavior: when_no_match
        httpMethod: POST
        type: aws_proxy



  /admin/system-settings:
    <<: *commonOptions
    get:
      tags: [Admin]
      summary: Get latest system settings
      operationId: get_admin_system_settings
      security:
        - adminAuthorizer: []
      responses:
        "200":
          description: Latest system settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  daily_token_limit: { type: integer }
                  min_messages_before_suggest: { type: integer }
                  max_chatacters_per_user_message: { type: integer }
                  max_chatacters_per_ai_message: { type: integer }
                  temperature: { type: number }
                  top_p: { type: number }
                  support_score_threshold: { type: number }
                  scope_alignment_score_threshold: { type: number }
                  grounded_threshold: { type: number }
                  partially_grounded_threshold: { type: number }
                  updated_by: { type: string, nullable: true }
                  updated_at: { type: string }
        "401": { description: Unauthorized }
        "500": { description: Internal Server Error }
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations
        passthroughBehavior: "when_no_match"
        httpMethod: POST
        type: aws_proxy

    put:
      tags: [Admin]
      summary: Update system settings (patch)
      operationId: put_admin_system_settings
      security:
        - adminAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                daily_token_limit: { type: integer }
                min_messages_before_suggest: { type: integer }
                max_chatacters_per_user_message: { type: integer }
                max_chatacters_per_ai_message: { type: integer }
                temperature: { type: number }
                top_p: { type: number }
                support_score_threshold: { type: number }
                scope_alignment_score_threshold: { type: number }
                grounded_threshold: { type: number }
                partially_grounded_threshold: { type: number }
      responses:
        "200":
          description: Updated system settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  daily_token_limit: { type: integer }
                  min_messages_before_suggest: { type: integer }
                  max_chatacters_per_user_message: { type: integer }
                  max_chatacters_per_ai_message: { type: integer }
                  temperature: { type: number }
                  top_p: { type: number }
                  support_score_threshold: { type: number }
                  scope_alignment_score_threshold: { type: number }
                  grounded_threshold: { type: number }
                  partially_grounded_threshold: { type: number }
                  updated_by: { type: string, nullable: true }
                  updated_at: { type: string }
        "400": { description: Bad Request }
        "401": { description: Unauthorized }
        "500": { description: Internal Server Error }
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations
        passthroughBehavior: "when_no_match"
        httpMethod: POST
        type: aws_proxy

  /admin/system-messages:
    <<: *commonOptions
    get:
      tags:
        - Admin
      summary: Get all system messages (with version history)
      operationId: get_admin_system_messages
      security:
        - adminAuthorizer: []
      responses:
        "200":
          description: All system messages grouped by type, including version history (active first)
          content:
            application/json:
              schema:
                type: object
                description: Map of system_message_type -> array of versions (active first, then newest)
                additionalProperties:
                  type: array
                  items:
                    type: object
                    required:
                      - id
                      - type
                      - content
                      - character_limit
                      - version
                      - is_active
                      - affects_text_generation
                      - created_by
                      - created_by_email
                      - created_at
                    properties:
                      id:
                        type: string
                        format: uuid
                      type:
                        type: string
                        description: System message type
                        enum:
                          - disclaimer
                          - guardrails
                          - system_role
                          - system_checklist
                          - system_instructions
                          - initial_prompt
                          - detective_phase_prompt
                          - suggestion_phase_prompt
                          - welcome_message
                          - partial_hallucination_warning
                          - full_hallucination_warning
                      content:
                        type: string
                        description: Message content
                      character_limit:
                        type: integer
                        description: Limit of characters allowed in message
                      version:
                        type: integer
                        minimum: 1
                        description: Incrementing version number per type
                      is_active:
                        type: boolean
                        description: Whether this version is currently active
                      affects_text_generation:
                        type: boolean
                        description: Whether this system nessage affects text generation
                      created_by:
                        type: string
                        format: uuid
                        nullable: true
                        description: UUID of the user who created this version (nullable for seeded rows)
                      created_by_email:
                        type: string
                        format: email
                        nullable: true
                        description: Email of the user who created this version (nullable for seeded rows)
                      created_at:
                        type: string
                        format: date-time
                        description: When this version was created
              examples:
                example:
                  value:
                    disclaimer:
                      - id: "2f0d8c1a-3e2e-4c5d-9c86-1f0a4f1c0d11"
                        type: "disclaimer"
                        content: "AI can make mistakes. Check important info."
                        character_limit: 400
                        version: 2
                        is_active: true
                        affects_text_generation: false
                        created_by: "cdfcaadc-cad4-4647-a98f-9e4e0a6e049f"
                        created_by_email: "admin@example.com"
                        created_at: "2026-02-18T19:21:18.406Z"
                      - id: "11111111-2222-3333-4444-555555555555"
                        type: "disclaimer"
                        content: "AI can make mistakes. Check important info."
                        character_limit: 400
                        version: 1
                        is_active: false
                        affects_text_generation: false
                        created_at: "2026-02-01T12:00:00.000Z"
                    welcome_message:
                      - id: "6bda6a51-2af0-4312-8d47-89f6169ae4ad"
                        type: "welcome_message"
                        content: "Together we will try to find the right program for you. Click below to start a new conversation."
                        character_limit: 400
                        version: 1
                        is_active: true
                        affects_text_generation: false
                        created_at: "2026-02-18T19:21:18.406Z"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (not an admin)
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations
        passthroughBehavior: "when_no_match"
        httpMethod: POST
        type: aws_proxy

  /admin/system-messages/{system_message_type}:
    <<: *commonOptions
    post:
      tags:
        - Admin
      summary: Create a new version of a system message and set it active
      operationId: create_admin_system_message_version
      security:
        - adminAuthorizer: []
      parameters:
        - name: system_message_type
          in: path
          required: true
          description: The system message type to create a new version for
          schema:
            type: string
            enum:
              - disclaimer
              - guardrails
              - system_role
              - system_checklist
              - system_instructions
              - initial_prompt
              - detective_phase_prompt
              - suggestion_phase_prompt
              - welcome_message
              - partial_hallucination_warning
              - full_hallucination_warning
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
                - adminEmail
              properties:
                content:
                  type: string
                  description: The full message content for the new version
                  example: "AI can make mistakes. Check important info."
                adminEmail:
                  type: string
                  description: Email of the admin creating this new version (used to populate created_by)
                  example: "admin@example.com"
      responses:
        "200":
          description: Created a new system message version (active)
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - type
                  - content
                  - character_limit
                  - version
                  - is_active
                  - affects_text_generation
                  - created_at
                properties:
                  id:
                    type: string
                    format: uuid
                  type:
                    type: string
                    description: System message type
                  content:
                    type: string
                  character_limit:
                    type: integer
                    description: Character limit enforced for this system message version
                  version:
                    type: integer
                    description: New version number (increments per type)
                  is_active:
                    type: boolean
                    description: Whether this version is active (should be true)
                  affects_text_generation:
                    type: boolean
                    description: Whether this message affects text generation
                  created_by:
                    type: string
                    format: uuid
                    nullable: true
                  created_by_email:
                    type: string
                    format: email
                    nullable: true
                  created_at:
                    type: string
                    format: date-time
        "400":
          description: Bad Request - Invalid type, missing/invalid content/adminEmail, or content exceeds character limit
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - Not an admin
        "404":
          description: Admin user not found for email
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations
        passthroughBehavior: "when_no_match"
        httpMethod: POST
        type: aws_proxy

  /admin/system-messages/{system_message_type}/{version_id}:
    <<: *commonOptions
    delete:
      tags:
        - Admin
      summary: Delete a non-active system message version
      operationId: delete_admin_system_message_version
      security:
        - adminAuthorizer: []
      parameters:
        - name: system_message_type
          in: path
          required: true
          description: The system message type that the version belongs to
          schema:
            type: string
            enum:
              - disclaimer
              - guardrails
              - system_role
              - system_checklist
              - system_instructions
              - initial_prompt
              - detective_phase_prompt
              - suggestion_phase_prompt
              - welcome_message
              - partial_hallucination_warning
              - full_hallucination_warning
        - name: version_id
          in: path
          required: true
          description: UUID of the system message version row to delete
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - adminEmail
              properties:
                adminEmail:
                  type: string
                  format: email
                  description: Email of the admin performing the delete (used to validate admin access)
                  example: "admin@example.com"
      responses:
        "200":
          description: System message version deleted successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - deleted
                properties:
                  success:
                    type: boolean
                    example: true
                  deleted:
                    type: object
                    required:
                      - id
                      - type
                      - version
                    properties:
                      id:
                        type: string
                        format: uuid
                      type:
                        type: string
                        enum:
                          - disclaimer
                          - guardrails
                          - system_role
                          - system_checklist
                          - system_instructions
                          - initial_prompt
                          - detective_phase_prompt
                          - suggestion_phase_prompt
                          - welcome_message
                          - partial_hallucination_warning
                          - full_hallucination_warning
                      version:
                        type: integer
                        minimum: 1
              examples:
                example:
                  value:
                    success: true
                    deleted:
                      id: "2f0d8c1a-3e2e-4c5d-9c86-1f0a4f1c0d11"
                      type: "disclaimer"
                      version: 2
        "400":
          description: Bad Request - Invalid type/version_id/adminEmail, or attempted to delete active version
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - Not an admin
        "404":
          description: Admin user not found or system message version not found
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations
        passthroughBehavior: "when_no_match"
        httpMethod: POST
        type: aws_proxy

  /admin/system-messages/{system_message_type}/{version_id}/activate:
    <<: *commonOptions
    post:
      tags:
        - Admin
      summary: Activate a system message version (and deactivate the previous active version)
      operationId: activate_admin_system_message_version
      security:
        - adminAuthorizer: []
      parameters:
        - name: system_message_type
          in: path
          required: true
          description: The system message type that the version belongs to
          schema:
            type: string
            enum:
              - disclaimer
              - guardrails
              - system_role
              - system_checklist
              - system_instructions
              - initial_prompt
              - detective_phase_prompt
              - suggestion_phase_prompt
              - welcome_message
              - partial_hallucination_warning
              - full_hallucination_warning
        - name: version_id
          in: path
          required: true
          description: UUID of the system message version row to activate
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - adminEmail
              properties:
                adminEmail:
                  type: string
                  format: email
                  description: Email of the admin performing the activation (used to validate admin access)
                  example: "admin@example.com"
      responses:
        "200":
          description: Activation successful (or already active)
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - status
                  - activated
                properties:
                  success:
                    type: boolean
                    example: true
                  status:
                    type: string
                    description: Whether the version was activated now or was already active
                    enum:
                      - activated
                      - already_active
                  activated:
                    type: object
                    required:
                      - id
                      - type
                      - content
                      - character_limit
                      - version
                      - is_active
                      - affects_text_generation
                      - created_at
                    properties:
                      id:
                        type: string
                        format: uuid
                      type:
                        type: string
                        enum:
                          - disclaimer
                          - guardrails
                          - system_role
                          - system_checklist
                          - system_instructions
                          - initial_prompt
                          - detective_phase_prompt
                          - suggestion_phase_prompt
                          - welcome_message
                      content:
                        type: string
                      character_limit:
                        type: integer
                        description: Character limit enforced for this system message version
                      version:
                        type: integer
                        minimum: 1
                      is_active:
                        type: boolean
                        description: Should be true
                        example: true
                      affects_text_generation:
                        type: boolean
                        description: Whether this message affects text generation
                      created_by:
                        type: string
                        format: uuid
                        nullable: true
                      created_by_email:
                        type: string
                        format: email
                        nullable: true
                      created_at:
                        type: string
                        format: date-time
                  previous_active:
                    type: object
                    nullable: true
                    description: The previously active version that was deactivated (null if none existed or target was already active)
                    properties:
                      id:
                        type: string
                        format: uuid
                      version:
                        type: integer
                        minimum: 1
              examples:
                activated_example:
                  value:
                    success: true
                    status: "activated"
                    activated:
                      id: "2f0d8c1a-3e2e-4c5d-9c86-1f0a4f1c0d11"
                      type: "disclaimer"
                      content: "AI can make mistakes. Check important info."
                      version: 2
                      is_active: true
                      created_by: "cdfcaadc-cad4-4647-a98f-9e4e0a6e049f"
                      created_by_email: "admin@example.com"
                      created_at: "2026-02-18T19:21:18.406Z"
                    previous_active:
                      id: "11111111-2222-3333-4444-555555555555"
                      version: 3
                already_active_example:
                  value:
                    success: true
                    status: "already_active"
                    activated:
                      id: "2f0d8c1a-3e2e-4c5d-9c86-1f0a4f1c0d11"
                      type: "disclaimer"
                      content: "AI can make mistakes. Check important info."
                      version: 2
                      is_active: true
                      created_by_email: "admin@example.com"
                      created_at: "2026-02-18T19:21:18.406Z"
        "400":
          description: Bad Request - Invalid type/version_id/adminEmail
        "401":
          description: Unauthorized
